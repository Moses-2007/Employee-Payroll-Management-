{% extends "layout.html" %}
{% block title %}PayrollPro - Edit Employee{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Edit Employee</h1>
    <p>Update employee details for {{ employee.name }} ({{ employee.emp_code }})</p>
</div>

<div class="card" style="max-width: 800px;">
    <form method="POST" action="{{ url_for('edit_employee', emp_id=employee.id) }}">
        <div class="form-row">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ employee.name }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" value="{{ employee.email or '' }}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" class="form-control" value="{{ employee.phone or '' }}">
            </div>
            <div class="form-group">
                <label for="department">Department</label>
                <select id="department" name="department" class="form-control">
                    <option value="">Select Department</option>
                    {% for dept in ['Engineering', 'Marketing', 'Finance', 'HR', 'Sales', 'Operations', 'Design', 'Support'] %}
                    <option value="{{ dept }}" {% if employee.department == dept %}selected{% endif %}>{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="designation">Designation</label>
                <input type="text" id="designation" name="designation" class="form-control" value="{{ employee.designation or '' }}">
            </div>
            <div class="form-group">
                <label for="star_rating">Performance Star Rating</label>
                <select id="star_rating" name="star_rating" class="form-control">
                    {% for i in range(0, 6) %}
                    <option value="{{ i }}" {% if employee.star_rating == i %}selected{% endif %}>{{ i }} Stars</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="basic_salary">Basic Salary <span style="font-size:11px; color: var(--accent-tertiary);">(words or numbers)</span></label>
                <input type="text" id="basic_salary" name="basic_salary" class="form-control" 
                       value="{{ employee.basic_salary }}" required>
                <div class="salary-preview" id="salaryPreview">
                    <div class="converted" id="convertedSalary">—</div>
                </div>
            </div>
            <div class="form-group">
                <!-- Spacer for layout -->
            </div>
        </div>

        <div class="btn-group mt-3">
            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block page_scripts %}
<script>
    let debounceTimer;
    document.getElementById('basic_salary').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const val = this.value.trim();
        if (!val) { document.getElementById('salaryPreview').classList.remove('visible'); return; }
        debounceTimer = setTimeout(async () => {
            try {
                const res = await fetch('/api/salary-preview', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({salary: val})
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('convertedSalary').textContent = data.formatted;
                    document.getElementById('salaryPreview').classList.add('visible');
                } else {
                    document.getElementById('salaryPreview').classList.remove('visible');
                }
            } catch(e) {}
        }, 500);
    });
</script>
{% endblock %}
